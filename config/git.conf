# Universal Git settings applied with `git config --global` by scripts/git.sh.
# Format is key=value (one per line), NOT Git's native INI syntax.
#
# Machine- and user-specific values are intentionally NOT here — they are
# resolved at install time by scripts/git.sh (interactive prompt or env var):
#   user.name         <- GIT_USER_NAME
#   user.email        <- GIT_USER_EMAIL
#   user.signingkey   <- GIT_SIGNING_KEY   (also toggles commit/tag gpgsign)
#   GitHub credential helper via `gh auth setup-git` (auto-detected)
# Nothing personal or host-specific is committed to this file.

# --- core ---
core.editor=vim
core.pager=less -x4
core.safecrlf=warn
core.autocrlf=input
core.longpaths=true
core.quotepath=false
core.fileMode=false

# --- behavior / ui ---
advice.statusuoption=false
color.ui=true
push.default=simple
pull.rebase=false
init.defaultBranch=main

# --- encoding ---
gui.encoding=utf-8
i18n.commitEncoding=utf-8
i18n.logOutputEncoding=utf-8

# --- git-lfs ---
filter.lfs.clean=git-lfs clean -- %f
filter.lfs.smudge=git-lfs smudge -- %f
filter.lfs.process=git-lfs filter-process
filter.lfs.required=true

# --- aliases: staging & commit ---
alias.a=!git add . && git status
alias.aa=!git add . && git add -u . && git status
alias.au=!git add -u . && git status
alias.ac=!git add . && git commit
alias.acm=!git add . && git commit -m
alias.c=commit
alias.ci=commit
alias.ca=commit --amend
alias.caa=commit -a --amend --no-edit
alias.onemore=commit -a --amend --no-edit
alias.unstage=reset HEAD --
alias.undo=reset --soft HEAD^
alias.cancel=reset --hard HEAD^

# --- aliases: branches & checkout ---
alias.br=branch
alias.co=checkout
alias.master=checkout master
alias.ren=branch --move
alias.sb=branch --verbose
alias.sbr=branch --verbose -r
alias.cp=cherry-pick
alias.cp-nc=cherry-pick --no-commit
alias.ri=!git rebase -i
alias.prune=!git fetch origin --prune

# --- aliases: status & diff ---
alias.s=status
alias.st=status
alias.d=diff
alias.df=diff

# --- aliases: log ---
alias.l=log --graph --all --pretty=format:'%C(yellow)%h%C(cyan)%d%Creset %s %C(white)- %an, %ar%Creset'
alias.l1=log --oneline -1
alias.last=log --oneline -30
alias.lg=log --color --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%ar) %C(bold blue)<%an>%Creset' --abbrev-commit -500
alias.lgn=log --oneline --decorate --color
alias.ll=log --stat --abbrev-commit
alias.llg=log --color --graph --pretty=format:'%C(bold white)%H %d%Creset%n%s%n%+b%C(bold blue)%an <%ae>%Creset %C(bold green)%cr (%ci)' --abbrev-commit
alias.lgg=log --graph --decorate -30 --all --date-order --date=format:'%Y-%m-%d %H:%M:%S' --pretty=format:'%C(cyan)%h%Creset %C(black bold)%ad%Creset%C(auto)%d %s'
alias.today=log --color --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%ar) %C(bold blue)<%an>%Creset' --abbrev-commit -500 --since="6am"

# --- aliases: inspection ---
alias.alias=!git config --list | grep 'alias\.' | sed 's/alias\.\([^=]*\)=\(.*\)/\1 = \2/' | sort
alias.ga=branch -a | tr -d * | xargs git grep
alias.author=shortlog -s -n --all --no-merges
alias.authors=shortlog -s -n --all --no-merges
alias.ig=update-index --assume-unchanged
alias.ug=update-index --no-assume-unchanged
alias.ignored=!git ls-files -v | grep ^[a-z]
alias.ugs=!git ls-files -v | grep ^[a-z]
alias.su=!cd $(git rev-parse --show-toplevel) && git standup

# --- aliases: svn bridge ---
alias.spull=svn rebase
alias.spush=svn dcommit
